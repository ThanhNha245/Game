<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Tết Và Mùa Xuân 🌸</title>
<!-- Icon cho trang web -->
<link rel="icon" href="images/hoa-dao.png" type="image/png">
<!-- Thư viện Lucide Icons sắc nét -->
<script src="https://unpkg.com/lucide@latest"></script>
<style>
    :root {
        --primary-red: #d60000;
        --primary-green: #006600;
        --correct-green: #28a745;
        --wrong-red: #dc3545;
        --tet-gold: #ffd700;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        text-align: center;
        background: linear-gradient(to bottom, #fff7cc, #ffd966);
        min-height: 100vh;
        overflow-x: hidden;
    }

    h1 {
        color: var(--primary-red);
        margin: 15px 0;
        text-shadow: 1px 1px 2px white;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: 2rem;
    }

    .topbar {
        display: flex;
        justify-content: center;
        gap: 20px;
        font-size: 1.3rem;
        font-weight: bold;
        margin: 10px auto;
        max-width: 600px;
        padding: 0 10px;
    }

    .stat-badge {
        background: white;
        padding: 8px 20px;
        border-radius: 30px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        justify-content: center;
    }

    .stat-badge.score {
        color: var(--primary-red);
    }

    .stat-badge.timer {
        color: var(--primary-green);
    }

    #question {
        font-size: 1.8rem;
        color: var(--primary-green);
        margin: 15px auto;
        background: white;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 10px 24px;
        border-radius: 50px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        max-width: 90%;
        box-sizing: border-box;
    }

    /* Hệ thống lưới co giãn linh hoạt theo màn hình điện thoại/máy tính */
    .game-area {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 15px;
        padding: 15px;
        max-width: 900px;
        margin: auto;
    }

    .card {
        background: white;
        border-radius: 20px;
        cursor: pointer;
        box-shadow: 0 5px 12px rgba(0,0,0,.15);
        transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        overflow: hidden;
        border: 5px solid transparent;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        aspect-ratio: 1 / 1.22;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(0,0,0,.25);
    }

    .card:active {
        transform: scale(0.95);
    }

    /* Hiệu ứng rung nhảy khi đúng */
    .card.correct-card {
        border-color: var(--correct-green);
        animation: bounce 0.5s ease;
    }

    /* Hiệu ứng lắc khi sai */
    .card.wrong-card {
        border-color: var(--wrong-red);
        animation: shake 0.4s ease;
    }

    .card-image {
        width: 100%;
        height: 72%;
        object-fit: cover;
        padding-top: 5px;
    }

    .name {
        font-size: 1.15rem;
        font-weight: bold;
        padding: 8px 5px;
        color: #333;
        background: #fafafa;
        border-top: 1px solid #eee;
    }

    #message {
        font-size: 1.8rem;
        margin: 10px;
        min-height: 45px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .msg-correct { color: var(--correct-green); }
    .msg-wrong { color: var(--wrong-red); }

    /* MÀN HÌNH CHỜ & KẾT THÚC: Đỏ hoàng gia viền kép vàng rực rỡ không khí Tết */
    .overlay-screen {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle, #e60000 20%, #800000 100%);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 1000;
        padding: 20px;
        border: 10px double var(--tet-gold);
        box-sizing: border-box;
        box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.6);
    }

    .overlay-screen h2 {
        font-size: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        color: var(--tet-gold);
        margin-bottom: 20px;
        text-align: center;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .overlay-screen p {
        font-size: 1.5rem;
        margin-bottom: 30px;
        text-align: center;
        max-width: 500px;
        line-height: 1.6;
        color: #fffef0;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .tet-decor {
        font-size: 2.5rem;
        color: var(--tet-gold);
        margin: 10px 0;
        display: flex;
        gap: 20px;
    }

    .pulse-btn {
        padding: 15px 40px;
        font-size: 1.5rem;
        border: 3px solid var(--tet-gold);
        border-radius: 50px;
        cursor: pointer;
        background: #b30000;
        color: var(--tet-gold);
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        animation: pulse 1.5s infinite;
        transition: transform 0.2s, background 0.2s;
    }

    .pulse-btn:hover {
        transform: scale(1.05);
        background: #990000;
    }

    /* Keyframes hiệu ứng */
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        50% { transform: translateX(10px); }
        75% { transform: translateX(-10px); }
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
        70% { box-shadow: 0 0 0 18px rgba(255, 215, 0, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
    }

    .firework {
        position: fixed;
        font-size: 40px;
        animation: boom 1s forwards;
        pointer-events: none;
    }

    @keyframes boom {
        from { opacity: 1; transform: translateY(0) scale(1); }
        to { opacity: 0; transform: translateY(-150px) scale(2); }
    }

    @media (min-width: 600px) {
        .game-area {
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
    }
</style>
</head>
<body>

<h1>
    <i data-lucide="flower"></i>
    TẾT VÀ MÙA XUÂN
    <i data-lucide="flower-2"></i>
</h1>

<div class="topbar">
    <div class="stat-badge score">
        <i data-lucide="sparkles"></i>
        <span>Điểm: <span id="score">0</span></span>
    </div>
    <div class="stat-badge timer">
        <i data-lucide="timer"></i>
        <span>Còn: <span id="timer">60</span>s</span>
    </div>
</div>

<div id="question"></div>
<div id="message"></div>

<!-- Khung lưới chứa thẻ hình ảnh -->
<div class="game-area" id="gameArea"></div>

<!-- Màn hình chờ bắt đầu cát tường -->
<div id="startScreen" class="overlay-screen">
    <div class="tet-decor">
        <i data-lucide="flower"></i>
        <i data-lucide="sparkles"></i>
        <i data-lucide="flower-2"></i>
    </div>
    <h2>🏮 CHÚC MỪNG NĂM MỚI! 🏮</h2>
    <p><i>Bé hãy lắng nghe cô đọc câu hỏi trên màn hình để tìm đáp án đúng nhé!</i></p>
    <button class="pulse-btn" onclick="startGame()">
        <i data-lucide="play"></i>
        Bắt Đầu Chơi Xuân 🌸
    </button>
</div>

<!-- Màn hình kết quả vinh danh rực rỡ -->
<div id="endScreen" class="overlay-screen" style="display: none;">
    <div class="tet-decor">
        <i data-lucide="party-popper"></i>
        <i data-lucide="trophy" style="color: var(--tet-gold);"></i>
        <i data-lucide="party-popper"></i>
    </div>
    <h2>🏆 CUNG CHÚC TÂN XUÂN 🏆</h2>
    <p>Bé đã hoàn thành trò chơi vô cùng xuất sắc!<br>Số điểm của bé là: <strong id="finalScore" style="color: var(--tet-gold); font-size: 2.8rem; text-shadow: 2px 2px 6px #000;">0</strong></p>
    <button class="pulse-btn" onclick="restartGame()">
        <i data-lucide="refresh-cw"></i>
        Chơi Lại Nhé 🔄
    </button>
</div>

<script>
// Giữ nguyên nguồn dữ liệu ảnh ban đầu của bạn
const data = [
    { name: "Hoa Mai", answer: "mai", src: "images/hoa-mai.png" },
    { name: "Hoa Đào", answer: "dao", src: "images/hoa-dao.png" },
    { name: "Bánh Chưng", answer: "chung", src: "images/banh-chung.png" },
    { name: "Bánh Tét", answer: "tet", src: "images/banh-tet.png" },
    { name: "Bao Lì Xì", answer: "lixi", src: "images/bao-li-xi.png" },
    { name: "Dưa Hấu", answer: "dua", src: "images/dua-hau.png" },
    { name: "Mâm Ngũ Quả", answer: "mam", src: "images/mam-ngu-qua.png" },
    { name: "Đèn Lồng", answer: "den", src: "images/den-long.png" }
];

let currentQuestion;
let score = 0;
let timeLeft = 60;
let timer = null;
let isWaiting = false;

// Audio Context tạo hiệu ứng âm thanh nhạc bính boong
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new AudioContext();
    }
}

// Âm thanh nhạc bính-boong khi đúng
function playCorrectSound() {
    initAudio();
    if (!audioCtx) return;
    let osc1 = audioCtx.createOscillator();
    let osc2 = audioCtx.createOscillator();
    let gainNode = audioCtx.createGain();

    osc1.type = 'sine';
    osc2.type = 'triangle';
    osc1.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
    osc1.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.15); // C6
    osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime); // E5
    osc2.frequency.exponentialRampToValueAtTime(1318.51, audioCtx.currentTime + 0.15); // E6

    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

    osc1.connect(gainNode);
    osc2.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    osc1.start();
    osc2.start();
    osc1.stop(audioCtx.currentTime + 0.4);
    osc2.stop(audioCtx.currentTime + 0.4);
}

// Âm thanh nhạc tạch tạch khi sai
function playWrongSound() {
    initAudio();
    if (!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gainNode = audioCtx.createGain();

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.25);

    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);

    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
}

// Đảo vị trí các thẻ
function shuffleArray(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Vẽ thẻ ngẫu nhiên lên màn hình
function renderCards() {
    const gameArea = document.getElementById("gameArea");
    gameArea.innerHTML = "";
    
    const shuffledData = shuffleArray(data);
    
    shuffledData.forEach(item => {
        const cardHTML = `
            <div class="card" data-ans="${item.answer}" onclick="checkAnswer(this)">
                <img src="${item.src}" alt="${item.name}" class="card-image">
                <div class="name">${item.name}</div>
            </div>
        `;
        gameArea.innerHTML += cardHTML;
    });
}

function randomQuestion() {
    isWaiting = false;
    currentQuestion = data[Math.floor(Math.random() * data.length)];
    
    // Câu hỏi chỉ hiển thị chữ rõ nét kèm biểu tượng kính lúp để giáo viên đọc cho bé nghe
    document.getElementById("question").innerHTML = `
        <i data-lucide="search" style="color: var(--primary-green); width: 24px; height: 24px;"></i>
        <span>Bé tìm: <b style="color: var(--primary-red);">${currentQuestion.name}</b></span>
    `;
    
    lucide.createIcons();
}

function createFirework() {
    const icons = ["🎆","✨","🎉","🌟"];
    let fw = document.createElement("div");
    fw.className = "firework";
    fw.innerHTML = icons[Math.floor(Math.random() * icons.length)];
    fw.style.left = Math.random() * 90 + "%";
    fw.style.top = Math.random() * 70 + "%";
    document.body.appendChild(fw);
    setTimeout(() => fw.remove(), 1000);
}

function checkAnswer(cardElement) {
    if(isWaiting) return; 

    initAudio();

    let ans = cardElement.getAttribute("data-ans");
    let msg = document.getElementById("message");

    if (ans === currentQuestion.answer) {
        isWaiting = true;
        score += 10;
        document.getElementById("score").innerText = score;
        
        msg.innerHTML = `<i data-lucide="check-circle" style="color: green;"></i> 🎉 Chính xác!`;
        msg.className = "msg-correct";
        cardElement.classList.add("correct-card");
        lucide.createIcons();

        playCorrectSound();

        for (let i = 0; i < 10; i++) createFirework();

        setTimeout(() => {
            msg.innerHTML = "";
            cardElement.classList.remove("correct-card");
            renderCards();
            randomQuestion();
        }, 1100);

    } else {
        msg.innerHTML = `<i data-lucide="x-circle" style="color: red;"></i> ❌ Chưa đúng rồi!`;
        msg.className = "msg-wrong";
        cardElement.classList.add("wrong-card");
        lucide.createIcons();

        playWrongSound();

        setTimeout(() => {
            msg.innerHTML = "";
            cardElement.classList.remove("wrong-card");
        }, 800);
    }
}

function startTimer() {
    if (timer) clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timer);
            endGame();
        }
    }, 1000);
}

function startGame() {
    initAudio();
    document.getElementById("startScreen").style.display = "none";
    score = 0;
    timeLeft = 60;
    document.getElementById("score").innerText = "0";
    document.getElementById("timer").innerText = "60";
    renderCards();
    randomQuestion();
    startTimer();
}

function endGame() {
    document.getElementById("endScreen").style.display = "flex";
    document.getElementById("finalScore").innerText = score;
    lucide.createIcons();
}

function restartGame() {
    document.getElementById("endScreen").style.display = "none";
    document.getElementById("message").innerHTML = "";
    startGame();
}

// Khởi tạo icon Lucide lần đầu
lucide.createIcons();
</script>
</body>
</html>
